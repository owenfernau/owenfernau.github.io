<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Safety Map — Owen Fernau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e6e6e0; --ink:#191916; --muted:#6c6c63;
    --line:#c9c9c0; --accent:#2f7a3a;
  }
  @media(prefers-color-scheme:dark){
    :root{ --paper:#16161a; --ink:#e7e7e0; --muted:#9a9a90; --line:#33332f; --accent:#7fc98b; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* header */
  .header{
    padding:24px 32px 20px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .header h1{ font-size:15px; font-weight:700; letter-spacing:-0.01em; }
  .header .meta{ font-size:11px; color:var(--muted); }

  /* cards row */
  .cards-row{
    display:flex; gap:10px; padding:20px 32px;
    border-bottom:1px solid var(--line);
  }
  .card{
    border-radius:4px; padding:10px 16px;
    font-size:12px; line-height:1.3;
    cursor:pointer; border:1px solid transparent;
    font-family:inherit; text-align:left;
    background:var(--line); color:var(--muted);
    transition:all .15s;
  }
  .card.has-notes{ color:var(--accent); border-color:var(--accent); background:transparent; }
  .card.active{ background:var(--accent); color:var(--paper); border-color:var(--accent); }
  .card:hover:not(.active){ border-color:var(--muted); color:var(--ink); }
  .card.has-notes:hover:not(.active){ background:transparent; color:var(--accent); border-color:var(--accent); opacity:.8; }

  /* layout */
  .layout{
    display:grid;
    grid-template-columns:1fr 260px;
    min-height:calc(100vh - 120px);
  }

  /* main panel */
  .main{
    padding:40px 48px;
    border-right:1px solid var(--line);
  }
  .panel-title{
    font-size:22px; font-weight:700; letter-spacing:-0.01em;
    margin-bottom:28px; color:var(--ink);
  }
  .panel-title.green{ color:var(--accent); }
  .note-list{ list-style:none; }
  .note-row{
    display:flex; align-items:baseline; gap:10px;
    padding:8px 0; border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .note-row:last-of-type{ border-bottom:none; }
  .note-dash{ color:var(--muted); flex-shrink:0; }
  .note-text{ flex:1; }

  /* sidebar */
  .sidebar{ padding:32px 24px; }
  .sidebar-label{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  .link-list{ list-style:none; }
  .link-item{
    display:flex; align-items:baseline; gap:6px;
    padding:7px 0; border-bottom:1px solid var(--line); font-size:12px;
  }
  .link-item:last-of-type{ border-bottom:none; }
  .link-item a{ color:var(--ink); text-decoration:none; flex:1; line-height:1.4; }
  .link-item a:hover{ color:var(--accent); }
  .link-arrow{ color:var(--accent); font-size:11px; flex-shrink:0; }
  .link-delete{
    background:none; border:none; color:transparent;
    font-family:inherit; font-size:12px; cursor:pointer; padding:0; flex-shrink:0;
  }
  .link-item:hover .link-delete{ color:var(--muted); }
  .link-delete:hover{ color:var(--ink) !important; }

  .add-link{ margin-top:18px; }
  .add-link input{
    font-family:inherit; font-size:12px; background:transparent;
    border:none; border-bottom:1px solid var(--line);
    color:var(--ink); outline:none; width:100%; padding:4px 0; margin-bottom:8px;
  }
  .add-link input::placeholder{ color:var(--muted); }
  .add-link input:focus{ border-bottom-color:var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>AI Safety Map (Dynamically Updating)</h1>
  <span class="meta" id="last-updated"></span>
</div>

<div class="cards-row" id="cards-row"></div>

<div class="layout">
  <main class="main" id="main-panel"></main>

  <aside class="sidebar">
    <div class="sidebar-label">links</div>
    <ul class="link-list" id="link-list"></ul>
    <div class="add-link" id="add-link-form" style="display:none">
      <input id="add-link-title" type="text" placeholder="title" autocomplete="off">
      <input id="add-link-url" type="text" placeholder="url" autocomplete="off">
    </div>
  </aside>
</div>

<script>
const IS_LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
let DATA = { root:'', lastUpdated:'', cards:[], links:[] };
let activeCardId = null;

async function loadData(){
  const res = await fetch('nodes.json');
  DATA = await res.json();
  if(!DATA.cards) DATA.cards = [];
  if(!DATA.links) DATA.links = [];
}

async function saveData(){
  if(!IS_LOCAL) return;
  const now = new Date();
  DATA.lastUpdated = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
  await fetch('/save',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(DATA)
  });
}

function renderHeader(){
  if(DATA.lastUpdated)
    document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
}

/* ---------- cards ---------- */
function renderCards(){
  const row = document.getElementById('cards-row');
  row.innerHTML = '';
  DATA.cards.forEach(c => {
    const btn = document.createElement('button');
    const hasNotes = c.notes && c.notes.length > 0;
    btn.className = 'card' +
      (hasNotes ? ' has-notes' : '') +
      (activeCardId === c.id ? ' active' : '');
    btn.textContent = c.title;
    btn.onclick = () => {
      activeCardId = activeCardId === c.id ? null : c.id;
      renderCards();
      renderPanel();
    };
    row.appendChild(btn);
  });
}

/* ---------- main panel ---------- */
function renderPanel(){
  const main = document.getElementById('main-panel');
  main.innerHTML = '';
  if(!activeCardId) return;

  const card = DATA.cards.find(c => c.id === activeCardId);
  if(!card) return;

  const hasNotes = card.notes && card.notes.length > 0;

  const title = document.createElement('div');
  title.className = 'panel-title' + (hasNotes ? ' green' : '');
  title.textContent = card.title;
  main.appendChild(title);

  const list = document.createElement('ul');
  list.className = 'note-list';
  (card.notes || []).forEach(note => {
    const li = document.createElement('li');
    li.className = 'note-row';
    li.innerHTML = '<span class="note-dash">—</span><span class="note-text">' + note + '</span>';
    list.appendChild(li);
  });
  main.appendChild(list);
}

/* ---------- links ---------- */
function renderLinks(){
  const list = document.getElementById('link-list');
  list.innerHTML = '';
  DATA.links.forEach(lnk => {
    const li = document.createElement('li');
    li.className = 'link-item';

    const a = document.createElement('a');
    a.href = lnk.url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = lnk.title;

    const arrow = document.createElement('span');
    arrow.className = 'link-arrow';
    arrow.textContent = '↗';

    li.appendChild(a);
    li.appendChild(arrow);

    if(IS_LOCAL){
      const del = document.createElement('button');
      del.className = 'link-delete';
      del.textContent = '×';
      del.onclick = async () => {
        DATA.links = DATA.links.filter(l => l.id !== lnk.id);
        await saveData();
        renderLinks();
      };
      li.appendChild(del);
    }
    list.appendChild(li);
  });
}

function setupAddLink(){
  if(!IS_LOCAL) return;
  document.getElementById('add-link-form').style.display = 'block';
  const titleIn = document.getElementById('add-link-title');
  const urlIn   = document.getElementById('add-link-url');
  urlIn.onkeydown = async e => {
    if(e.key !== 'Enter') return;
    const title = titleIn.value.trim();
    let url = urlIn.value.trim();
    if(!title || !url) return;
    if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
    DATA.links.push({ id:'l-'+Date.now(), title, url });
    await saveData();
    titleIn.value = ''; urlIn.value = '';
    renderLinks();
    titleIn.focus();
  };
}

async function init(){
  await loadData();
  renderHeader();
  renderCards();
  renderPanel();
  renderLinks();
  setupAddLink();
}

init();
</script>
</body>
</html>
