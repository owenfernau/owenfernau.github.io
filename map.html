<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Map — Owen Fernau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e6e6e0; --ink:#191916; --muted:#6c6c63;
    --line:#c9c9c0; --accent:#2f7a3a;
  }
  @media(prefers-color-scheme:dark){
    :root{ --paper:#16161a; --ink:#e7e7e0; --muted:#9a9a90; --line:#33332f; --accent:#7fc98b; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .header{
    padding:24px 32px 20px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:16px; justify-content:space-between;
  }
  .header-left{ display:flex; align-items:baseline; gap:14px; flex:1; min-width:0; }
  .header h1{ font-size:15px; font-weight:700; letter-spacing:-0.01em; white-space:nowrap; }
  .meta{ font-size:11px; color:var(--muted); white-space:nowrap; }

  .breadcrumb{
    display:flex; align-items:baseline; gap:5px;
    font-size:12px; color:var(--muted); overflow:hidden; flex-wrap:wrap;
  }
  .crumb{ cursor:pointer; }
  .crumb:hover{ color:var(--ink); }
  .crumb.current{ color:var(--ink); cursor:default; }
  .crumb-sep{ color:var(--line); user-select:none; }

  .layout{
    display:grid;
    grid-template-columns:1fr 260px;
    min-height:calc(100vh - 73px);
  }

  .main{
    padding:40px 48px;
    border-right:1px solid var(--line);
  }

  #graph-svg{ width:100%; height:auto; display:block; overflow:visible; }

  .sidebar{ padding:32px 24px; display:flex; flex-direction:column; gap:24px; }

  .node-panel{ padding-bottom:24px; border-bottom:1px solid var(--line); }
  .np-title{ font-size:14px; font-weight:700; margin-bottom:10px; }
  .np-explore{
    margin-top:12px; font-size:11px; color:var(--accent);
    cursor:pointer; background:none; border:none;
    font-family:inherit; padding:0; display:block;
  }
  .np-explore:hover{ opacity:.75; }

  .note-list{ list-style:none; }
  .note-row{
    display:flex; align-items:baseline; gap:8px;
    padding:5px 0; border-bottom:1px solid var(--line); font-size:12px;
  }
  .note-row:last-of-type{ border-bottom:none; }
  .note-dash{ color:var(--muted); flex-shrink:0; }
  .note-empty{ font-size:11px; color:var(--muted); font-style:italic; }

  .section-label{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  .link-list{ list-style:none; }
  .link-item{
    display:flex; align-items:baseline; gap:6px;
    padding:7px 0; border-bottom:1px solid var(--line); font-size:12px;
  }
  .link-item:last-of-type{ border-bottom:none; }
  .link-item a{ color:var(--ink); text-decoration:none; flex:1; line-height:1.4; }
  .link-item a:hover{ color:var(--accent); }
  .link-arr{ color:var(--accent); font-size:11px; flex-shrink:0; }
  .link-del{
    background:none; border:none; color:transparent;
    font-family:inherit; font-size:12px; cursor:pointer; padding:0; flex-shrink:0;
  }
  .link-item:hover .link-del{ color:var(--muted); }
  .link-del:hover{ color:var(--ink) !important; }

  .add-link input{
    font-family:inherit; font-size:12px; background:transparent;
    border:none; border-bottom:1px solid var(--line);
    color:var(--ink); outline:none; width:100%; padding:4px 0; margin-bottom:8px;
  }
  .add-link input::placeholder{ color:var(--muted); }
  .add-link input:focus{ border-bottom-color:var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>AI Map</h1>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </div>
  <span class="meta" id="last-updated"></span>
</div>

<div class="layout">
  <main class="main">
    <svg id="graph-svg"></svg>
  </main>
  <aside class="sidebar">
    <div id="node-panel" style="display:none" class="node-panel">
      <div class="np-title" id="np-title"></div>
      <ul class="note-list" id="np-notes"></ul>
      <button class="np-explore" id="np-explore" style="display:none">explore →</button>
    </div>

    <div>
      <div class="section-label">links</div>
      <ul class="link-list" id="link-list"></ul>
      <div class="add-link" id="add-link-form" style="display:none">
        <input id="add-link-title" type="text" placeholder="title" autocomplete="off">
        <input id="add-link-url" type="text" placeholder="url" autocomplete="off">
      </div>
    </div>
  </aside>
</div>

<script>
const IS_LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const R   = 28;  // node circle radius
const PAD = 72;  // viewBox padding
const LBL = R + 18; // label y-offset below circle center

let DATA = {};
let graphStack = ['root'];
let activeNodeId = null;

// ── data ──────────────────────────────────────────────────────────────────────

async function loadData(){
  const res = await fetch('nodes.json');
  DATA = await res.json();
  if(!DATA.nodeLibrary) DATA.nodeLibrary = {};
  if(!DATA.graphs)      DATA.graphs = [];
  if(!DATA.links)       DATA.links  = [];
}

async function saveData(){
  if(!IS_LOCAL) return;
  const now = new Date();
  DATA.lastUpdated = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
  await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DATA)});
}

// ── helpers ───────────────────────────────────────────────────────────────────

const getGraph    = id => DATA.graphs.find(g => g.id === id);
const getNode     = id => DATA.nodeLibrary[id];
const hasSubGraph = id => !!getGraph(id);
const currentGid  = ()  => graphStack[graphStack.length - 1];

function svgEl(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }

function computeViewBox(graph){
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  graph.nodes.forEach(p => {
    if(p.x == null) return;
    minX = Math.min(minX, p.x - R);
    minY = Math.min(minY, p.y - R);
    maxX = Math.max(maxX, p.x + R);
    maxY = Math.max(maxY, p.y + R);
  });
  if(minX === Infinity) return '0 0 800 500';
  // extra bottom padding for labels below circles
  return `${minX-PAD} ${minY-PAD} ${maxX-minX+PAD*2} ${maxY-minY+PAD*2+LBL}`;
}

// ── navigation ────────────────────────────────────────────────────────────────

function navigateTo(graphId){
  graphStack.push(graphId);
  activeNodeId = null;
  renderAll();
}

function navigateToIndex(i){
  graphStack = graphStack.slice(0, i + 1);
  activeNodeId = null;
  renderAll();
}

// ── render: breadcrumb ────────────────────────────────────────────────────────

function renderBreadcrumb(){
  const nav = document.getElementById('breadcrumb');
  nav.innerHTML = '';
  graphStack.forEach((gid, i) => {
    const g = getGraph(gid);
    const title = g ? g.title : gid;
    const isCurrent = i === graphStack.length - 1;
    if(i > 0){
      const sep = document.createElement('span');
      sep.className = 'crumb-sep';
      sep.textContent = '/';
      nav.appendChild(sep);
    }
    const span = document.createElement('span');
    span.className = 'crumb' + (isCurrent ? ' current' : '');
    span.textContent = title;
    if(!isCurrent) span.onclick = () => navigateToIndex(i);
    nav.appendChild(span);
  });
}

// ── render: SVG graph ─────────────────────────────────────────────────────────

function renderGraph(){
  const svg = document.getElementById('graph-svg');
  svg.innerHTML = '';

  const graph = getGraph(currentGid());
  if(!graph) return;

  svg.setAttribute('viewBox', computeViewBox(graph));

  // arrowhead: context-stroke inherits the line's stroke color
  const defs = svgEl('defs');
  defs.innerHTML = `
    <marker id="arr" markerWidth="12" markerHeight="8"
      refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,8 L12,4 z" fill="context-stroke"/>
    </marker>`;
  svg.appendChild(defs);

  // transparent background rect to catch deselect clicks
  const bg = svgEl('rect');
  bg.setAttribute('x', -9999); bg.setAttribute('y', -9999);
  bg.setAttribute('width', 99999); bg.setAttribute('height', 99999);
  bg.setAttribute('fill', 'transparent');
  bg.onclick = () => { activeNodeId = null; renderAll(); };
  svg.appendChild(bg);

  // edges (behind nodes)
  graph.edges.forEach(edge => {
    const fp = graph.nodes.find(n => n.ref === edge.from);
    const tp = graph.nodes.find(n => n.ref === edge.to);
    if(!fp || !tp || fp.x == null || tp.x == null) return;

    const dx = tp.x - fp.x, dy = tp.y - fp.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if(len === 0) return;
    const ux = dx/len, uy = dy/len;

    const isAmbient = edge.type === 'ambient';
    const line = svgEl('line');
    line.setAttribute('x1', fp.x + R*ux);
    line.setAttribute('y1', fp.y + R*uy);
    line.setAttribute('x2', tp.x - R*ux);
    line.setAttribute('y2', tp.y - R*uy);
    line.setAttribute('stroke', isAmbient ? 'var(--muted)' : 'var(--ink)');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('marker-end', 'url(#arr)');
    if(isAmbient) line.setAttribute('stroke-dasharray', '5 4');
    svg.appendChild(line);
  });

  // nodes (in front of edges)
  graph.nodes.forEach(p => {
    if(p.x == null) return;
    const node = getNode(p.ref);
    if(!node) return;

    const isActive   = node.id === activeNodeId;
    const drillable  = hasSubGraph(node.id);
    const hasNotes   = node.notes && node.notes.length > 0;

    const g = svgEl('g');
    g.setAttribute('transform', `translate(${p.x},${p.y})`);
    if(drillable || hasNotes) g.style.cursor = 'pointer';

    const circle = svgEl('circle');
    circle.setAttribute('r', R);
    circle.setAttribute('cx', 0); circle.setAttribute('cy', 0);
    circle.setAttribute('stroke-width', '1.5');

    if(isActive){
      circle.setAttribute('fill', 'var(--ink)');
      circle.setAttribute('stroke', 'var(--ink)');
    } else if(node.type === 'ambient'){
      circle.setAttribute('fill', 'var(--paper)');
      circle.setAttribute('stroke', 'var(--muted)');
      circle.setAttribute('stroke-dasharray', '4 3');
    } else if(node.type === 'output'){
      circle.setAttribute('fill', 'var(--paper)');
      circle.setAttribute('stroke', 'var(--accent)');
    } else {
      circle.setAttribute('fill', 'var(--paper)');
      circle.setAttribute('stroke', 'var(--ink)');
    }
    g.appendChild(circle);

    const text = svgEl('text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'auto');
    text.setAttribute('y', LBL);
    text.setAttribute('font-family', '"JetBrains Mono", monospace');
    text.setAttribute('font-size', '11');
    text.setAttribute('fill',
      node.type === 'ambient' ? 'var(--muted)' :
      node.type === 'output'  ? 'var(--accent)' :
      'var(--ink)');
    text.textContent = node.label;
    g.appendChild(text);

    g.onclick = e => { e.stopPropagation(); handleNodeClick(node.id); };
    svg.appendChild(g);
  });
}

// ── render: node panel ────────────────────────────────────────────────────────

function renderNodePanel(){
  const panel      = document.getElementById('node-panel');
  const titleEl    = document.getElementById('np-title');
  const notesList  = document.getElementById('np-notes');
  const exploreBtn = document.getElementById('np-explore');

  if(!activeNodeId){ panel.style.display = 'none'; return; }

  const node = getNode(activeNodeId);
  if(!node){ panel.style.display = 'none'; return; }

  panel.style.display = 'block';
  titleEl.textContent = node.label;

  notesList.innerHTML = '';
  const notes = node.notes || [];
  if(notes.length === 0){
    const empty = document.createElement('span');
    empty.className = 'note-empty';
    empty.textContent = 'no notes yet';
    notesList.appendChild(empty);
  } else {
    notes.forEach(note => {
      const li   = document.createElement('li');
      li.className = 'note-row';
      const dash = document.createElement('span');
      dash.className = 'note-dash'; dash.textContent = '—';
      const txt  = document.createElement('span');
      txt.textContent = typeof note === 'string' ? note : note.text;
      li.appendChild(dash); li.appendChild(txt);
      notesList.appendChild(li);
    });
  }

  if(hasSubGraph(activeNodeId)){
    exploreBtn.style.display = 'block';
    exploreBtn.onclick = () => navigateTo(activeNodeId);
  } else {
    exploreBtn.style.display = 'none';
  }
}

// ── render: links ─────────────────────────────────────────────────────────────

function renderLinks(){
  const list = document.getElementById('link-list');
  list.innerHTML = '';
  DATA.links.forEach(lnk => {
    const li  = document.createElement('li');
    li.className = 'link-item';
    const a   = document.createElement('a');
    a.href = lnk.url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = lnk.title;
    const arr = document.createElement('span');
    arr.className = 'link-arr'; arr.textContent = '↗';
    li.appendChild(a); li.appendChild(arr);
    if(IS_LOCAL){
      const del = document.createElement('button');
      del.className = 'link-del'; del.textContent = '×';
      del.onclick = async () => {
        DATA.links = DATA.links.filter(l => l.id !== lnk.id);
        await saveData(); renderLinks();
      };
      li.appendChild(del);
    }
    list.appendChild(li);
  });
}

function setupAddLink(){
  if(!IS_LOCAL) return;
  document.getElementById('add-link-form').style.display = 'block';
  const titleIn = document.getElementById('add-link-title');
  const urlIn   = document.getElementById('add-link-url');
  urlIn.onkeydown = async e => {
    if(e.key !== 'Enter') return;
    const title = titleIn.value.trim();
    let url = urlIn.value.trim();
    if(!title || !url) return;
    if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
    DATA.links.push({id:'l-'+Date.now(), title, url});
    await saveData(); renderLinks(); titleIn.value = ''; urlIn.value = ''; titleIn.focus();
  };
}

// ── node click ────────────────────────────────────────────────────────────────

function handleNodeClick(nodeId){
  activeNodeId = activeNodeId === nodeId ? null : nodeId;
  renderAll();
}

// ── main ──────────────────────────────────────────────────────────────────────

function renderAll(){
  renderBreadcrumb();
  renderGraph();
  renderNodePanel();
}

async function init(){
  await loadData();
  if(DATA.lastUpdated)
    document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
  renderAll();
  renderLinks();
  setupAddLink();
}

init();
</script>
</body>
</html>
