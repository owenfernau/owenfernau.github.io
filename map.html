<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Map — Owen Fernau</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e6e6e0; --ink:#191916; --muted:#6c6c63;
    --line:#c9c9c0; --accent:#2f7a3a;
  }
  @media(prefers-color-scheme:dark){
    :root{ --paper:#16161a; --ink:#e7e7e0; --muted:#9a9a90; --line:#33332f; --accent:#7fc98b; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  .header{
    padding:24px 32px 20px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:16px; justify-content:space-between;
  }
  .header-left{ display:flex; align-items:baseline; gap:14px; flex:1; min-width:0; }
  .header h1{
    font-size:15px; font-weight:700; letter-spacing:-0.01em; white-space:nowrap;
    cursor:pointer;
  }
  .header h1:hover{ opacity:.7; }
  .meta{ font-size:11px; color:var(--muted); white-space:nowrap; }

  .breadcrumb{
    display:flex; align-items:baseline; gap:5px;
    font-size:12px; color:var(--muted); overflow:hidden; flex-wrap:wrap;
  }
  .crumb{ cursor:pointer; }
  .crumb:hover{ color:var(--ink); }
  .crumb.current{ color:var(--ink); cursor:default; }
  .crumb-sep{ color:var(--line); user-select:none; }

  .layout{
    display:grid;
    grid-template-columns:1fr 260px;
    min-height:calc(100vh - 73px);
  }

  .main{ padding:40px 48px; border-right:1px solid var(--line); }

  #graph-svg{ width:100%; height:auto; display:block; overflow:visible; }

  .sidebar{ padding:32px 24px; }

  .section-label{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  .link-list{ list-style:none; }
  .link-item{
    display:flex; align-items:baseline; gap:6px;
    padding:7px 0; border-bottom:1px solid var(--line); font-size:12px;
  }
  .link-item:last-of-type{ border-bottom:none; }
  .link-item a{ color:var(--ink); text-decoration:none; flex:1; line-height:1.4; }
  .link-item a:hover{ color:var(--accent); }
  .link-arr{ color:var(--accent); font-size:11px; flex-shrink:0; }
  .link-del{
    background:none; border:none; color:transparent;
    font-family:inherit; font-size:12px; cursor:pointer; padding:0; flex-shrink:0;
  }
  .link-item:hover .link-del{ color:var(--muted); }
  .link-del:hover{ color:var(--ink) !important; }

  .add-link input{
    font-family:inherit; font-size:12px; background:transparent;
    border:none; border-bottom:1px solid var(--line);
    color:var(--ink); outline:none; width:100%; padding:4px 0; margin-bottom:8px;
  }
  .add-link input::placeholder{ color:var(--muted); }
  .add-link input:focus{ border-bottom-color:var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1 id="h1-home">AI Map</h1>
    <nav class="breadcrumb" id="breadcrumb"></nav>
  </div>
  <span class="meta" id="last-updated"></span>
</div>

<div class="layout">
  <main class="main">
    <svg id="graph-svg"></svg>
  </main>
  <aside class="sidebar">
    <div class="section-label">links</div>
    <ul class="link-list" id="link-list"></ul>
    <div class="add-link" id="add-link-form" style="display:none">
      <input id="add-link-title" type="text" placeholder="title" autocomplete="off">
      <input id="add-link-url" type="text" placeholder="url" autocomplete="off">
    </div>
  </aside>
</div>

<script>
const IS_LOCAL = ['localhost','127.0.0.1'].includes(location.hostname);
const R       = 34;   // node circle radius
const PAD     = 72;   // viewBox padding
const LBL     = R + 22; // label y-offset below circle center
const ENC_PAD = 60;   // padding from node edges to enclosing circle

let DATA = {};
let graphStack = ['root'];

// ── data ──────────────────────────────────────────────────────────────────────

async function loadData(){
  const res = await fetch('nodes.json');
  DATA = await res.json();
  if(!DATA.nodeLibrary) DATA.nodeLibrary = {};
  if(!DATA.graphs)      DATA.graphs = [];
  if(!DATA.links)       DATA.links  = [];
}

async function saveData(){
  if(!IS_LOCAL) return;
  const now = new Date();
  DATA.lastUpdated = now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
  await fetch('/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(DATA)});
}

// ── helpers ───────────────────────────────────────────────────────────────────

const getGraph    = id => DATA.graphs.find(g => g.id === id);
const getNode     = id => DATA.nodeLibrary[id];
const hasSubGraph = id => !!getGraph(id);
const currentGid  = ()  => graphStack[graphStack.length - 1];

function svgEl(tag){ return document.createElementNS('http://www.w3.org/2000/svg', tag); }

function graphBounds(graph){
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  graph.nodes.forEach(p => {
    if(p.x == null) return;
    minX = Math.min(minX, p.x-R); minY = Math.min(minY, p.y-R);
    maxX = Math.max(maxX, p.x+R); maxY = Math.max(maxY, p.y+R);
  });
  return { minX, minY, maxX, maxY, valid: minX !== Infinity };
}

function minEnclosingCircle(graph){
  const pts = graph.nodes.filter(p => p.x != null);
  if(!pts.length) return null;
  const cx = pts.reduce((s,p) => s+p.x, 0) / pts.length;
  const cy = pts.reduce((s,p) => s+p.y, 0) / pts.length;
  const r  = Math.max(...pts.map(p => Math.sqrt((p.x-cx)**2+(p.y-cy)**2))) + R + ENC_PAD;
  return { cx, cy, r };
}

function computeViewBox(bounds, enc){
  if(!bounds.valid) return '0 0 800 500';
  if(enc){
    const { cx, cy, r } = enc;
    return `${cx-r-PAD} ${cy-r-PAD} ${(r+PAD)*2} ${(r+PAD)*2}`;
  }
  const { minX, minY, maxX, maxY } = bounds;
  return `${minX-PAD} ${minY-PAD} ${maxX-minX+PAD*2} ${maxY-minY+PAD*2+LBL}`;
}

// ── navigation ────────────────────────────────────────────────────────────────

function navigateTo(graphId){
  graphStack.push(graphId);
  renderAll();
}

function navigateToIndex(i){
  graphStack = graphStack.slice(0, i+1);
  renderAll();
}

// ── render: breadcrumb ────────────────────────────────────────────────────────
// h1 handles root; breadcrumb only shows levels below root

function renderBreadcrumb(){
  const nav = document.getElementById('breadcrumb');
  nav.innerHTML = '';
  graphStack.slice(1).forEach((gid, i) => {
    const realIdx  = i + 1;
    const g        = getGraph(gid);
    const title    = g ? g.title : gid;
    const isCurrent = realIdx === graphStack.length - 1;
    if(i > 0){
      const sep = document.createElement('span');
      sep.className = 'crumb-sep'; sep.textContent = '/';
      nav.appendChild(sep);
    }
    const span = document.createElement('span');
    span.className = 'crumb' + (isCurrent ? ' current' : '');
    span.textContent = title;
    if(!isCurrent) span.onclick = () => navigateToIndex(realIdx);
    nav.appendChild(span);
  });
}

// ── invariants ────────────────────────────────────────────────────────────────
// These must hold at every step of layout work. If something looks wrong here,
// check these before touching positions or edge routing.
//
// 1. ROOT GRAPH STRUCTURE  (nodes.json → graphs[id="root"].edges)
//    data            → ai-capability   (type: input)
//    algorithms      → ai-capability   (type: input)
//    computing-power → ai-capability   (type: input)
//    Every input node has its OWN individual arrow to ai-capability.
//    NEVER route one node's arrow through another node, and NEVER let a shared
//    path segment imply a connection that doesn't exist in the data.
//
// 2. GHOST ROW LAYOUT
//    When drilling into a sub-graph, parent-graph peers render as ghost nodes.
//    - Input/stack nodes  → y = ghostY          (the base ghost row)
//    - Output nodes       → y = ghostY - 120    (floated above the row)
//    The 120px lift is what prevents straight-line edges from input nodes to
//    ai-capability from passing through intermediate input nodes on the same row.
//    Do not collapse this offset without re-checking all edge clearances.
//
// 3. KINK PATH (circleEdges)
//    The elbow connector from the enclosing circle to its output target always
//    uses gp.y (the target ghost node's actual y), NOT a hardcoded row y.
//    This ensures the arrow lands at the output node regardless of its vertical
//    offset — keeping invariant #2 intact even if the offset changes.
//
// 4. ORIENTATION ANCHOR
//    The label of the currently selected sub-graph (e.g. "computing power",
//    "chips") always sits at the same vertical level as its peer ghost nodes
//    (ghostY + LBLS). This holds at every depth: drilling into chips should
//    show the chips label level with energy and data centers, just as computing
//    power is level with data and algorithms. Never place the enclosing label
//    at a different y than ghostY + LBLS when a parent context exists.

// ── render: SVG graph ─────────────────────────────────────────────────────────

function renderGraph(){
  const svg = document.getElementById('graph-svg');
  svg.innerHTML = '';

  const graph = getGraph(currentGid());
  if(!graph) return;

  const isSubGraph = graphStack.length > 1;
  const bounds     = graphBounds(graph);
  const enc        = isSubGraph ? minEnclosingCircle(graph) : null;

  // collect ghost context: sibling nodes projected outside the enclosing circle
  let ghostData = null;
  if(isSubGraph && enc){
    const parentGid    = graphStack[graphStack.length - 2];
    const parentGraph  = getGraph(parentGid);
    const selfInParent = parentGraph && parentGraph.nodes.find(n => n.ref === currentGid());
    if(parentGraph && selfInParent && selfInParent.x != null){
      const GHOST_MIN = enc.r + R + 60;
      const peers = parentGraph.nodes.filter(n => n.ref !== currentGid() && n.x != null);
      const rawDists = peers.map(p => {
        const vx = p.x - selfInParent.x, vy = p.y - selfInParent.y;
        return Math.sqrt(vx*vx + vy*vy) || 1;
      });
      const scale = GHOST_MIN / Math.min(...rawDists);
      const nodeMap = {};
      const ghostY = enc.cy - enc.r - R - 20;
      peers.forEach(p => {
        const vx = p.x - selfInParent.x;
        const pNode = DATA.nodeLibrary[p.ref];
        const yOff = (pNode && pNode.type === 'output') ? -120 : 0;
        nodeMap[p.ref] = { ref: p.ref, x: enc.cx + vx*scale, y: ghostY + yOff };
      });
      ghostData = {
        nodes: Object.values(nodeMap),
        nodeMap,
        ghostY,
        edges:       parentGraph.edges.filter(e => e.from !== currentGid() && e.to !== currentGid()),
        circleEdges: parentGraph.edges.filter(e => e.from === currentGid() || e.to === currentGid())
      };
    }
  }

  // expand viewBox to include ghost nodes
  let vbStr = computeViewBox(bounds, enc);
  if(ghostData){
    const [vx0, vy0, vw0, vh0] = vbStr.split(' ').map(Number);
    let vx = vx0, vy = vy0, x2 = vx0+vw0, y2 = vy0+vh0;
    ghostData.nodes.forEach(p => {
      vx = Math.min(vx, p.x - R - PAD);
      vy = Math.min(vy, p.y - R - PAD);
      x2 = Math.max(x2, p.x + R + PAD);
      y2 = Math.max(y2, p.y + R + PAD + LBL);
    });
    vbStr = `${vx} ${vy} ${x2-vx} ${y2-vy}`;
  }
  svg.setAttribute('viewBox', vbStr);

  // scale font size and label offset so text appears the same physical size
  // regardless of how large the viewBox is (sub-graphs have much larger viewBoxes)
  const [,, vbw] = vbStr.split(' ').map(Number);
  const containerW = (svg.parentElement && svg.parentElement.clientWidth) || 900;
  const vscale = containerW > 0 ? vbw / containerW : 1;
  const FS   = Math.round(15 * vscale);
  const LBLS = Math.round(LBL * vscale);

  const defs = svgEl('defs');
  defs.innerHTML = `
    <marker id="arr" markerWidth="12" markerHeight="8"
      refX="12" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,8 L12,4 z" fill="context-stroke"/>
    </marker>`;
  svg.appendChild(defs);

  // ghost context: parent graph rendered faintly outside the enclosing circle
  if(ghostData){
    const ghostG = svgEl('g');
    ghostG.setAttribute('opacity', '1');

    ghostData.edges.forEach(edge => {
      const fp = ghostData.nodeMap[edge.from];
      const tp = ghostData.nodeMap[edge.to];
      if(!fp || !tp) return;
      const ddx = tp.x-fp.x, ddy = tp.y-fp.y;
      const len = Math.sqrt(ddx*ddx+ddy*ddy);
      if(len === 0) return;
      const ux = ddx/len, uy = ddy/len;
      const line = svgEl('line');
      line.setAttribute('x1', fp.x+R*ux); line.setAttribute('y1', fp.y+R*uy);
      line.setAttribute('x2', tp.x-R*ux); line.setAttribute('y2', tp.y-R*uy);
      line.setAttribute('stroke', 'var(--ink)');
      line.setAttribute('stroke-width', '1.5');
      line.setAttribute('marker-end', 'url(#arr)');
      ghostG.appendChild(line);
    });

    // edges connecting the enclosing circle to ghost nodes — kinked path
    ghostData.circleEdges.forEach(edge => {
      const isFrom = edge.from === currentGid();
      const gp     = ghostData.nodeMap[isFrom ? edge.to : edge.from];
      if(!gp) return;
      const gy   = gp.y;
      const topY = enc.cy - enc.r - 2;        // just outside circle top
      const endX = gp.x + (gp.x < enc.cx ? R : -R); // approach from correct side
      let d;
      if(isFrom){
        d = `M ${enc.cx},${topY} L ${enc.cx},${gy} L ${endX},${gy}`;
      } else {
        const startX = gp.x + (gp.x < enc.cx ? -R : R);
        d = `M ${startX},${gy} L ${enc.cx},${gy} L ${enc.cx},${topY}`;
      }
      const path = svgEl('path');
      path.setAttribute('d', d);
      path.setAttribute('fill', 'none');
      path.setAttribute('stroke', 'var(--ink)');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('marker-end', 'url(#arr)');
      ghostG.appendChild(path);
    });

    ghostData.nodes.forEach(p => {
      const node = getNode(p.ref);
      if(!node) return;
      const g = svgEl('g');
      g.setAttribute('transform', `translate(${p.x},${p.y})`);
      const circle = svgEl('circle');
      circle.setAttribute('r', R);
      circle.setAttribute('cx', 0); circle.setAttribute('cy', 0);
      circle.setAttribute('stroke-width', '1.5');
      circle.setAttribute('fill', 'var(--paper)');
      circle.setAttribute('stroke',
        node.type === 'ambient' ? 'var(--muted)' :
        node.type === 'output'  ? 'var(--accent)' : 'var(--ink)');
      if(node.type === 'ambient') circle.setAttribute('stroke-dasharray', '4 3');
      g.appendChild(circle);
      const text = svgEl('text');
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'auto');
      text.setAttribute('y', LBLS);
      text.setAttribute('font-family', '"JetBrains Mono", monospace');
      text.setAttribute('font-size', FS);
      text.setAttribute('fill',
        node.type === 'ambient' ? 'var(--muted)' :
        node.type === 'output'  ? 'var(--accent)' : 'var(--ink)');
      text.textContent = node.label;
      g.appendChild(text);
      ghostG.appendChild(g);
    });

    svg.appendChild(ghostG);
  }

  // enclosing circle — drawn first so it's behind everything
  if(enc){
    const parentNode = getNode(currentGid());
    const encG = svgEl('g');

    const circle = svgEl('circle');
    circle.setAttribute('cx', enc.cx); circle.setAttribute('cy', enc.cy);
    circle.setAttribute('r', enc.r);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', 'var(--accent)');
    circle.setAttribute('stroke-width', '1');
    circle.setAttribute('stroke-dasharray', '6 5');
    encG.appendChild(circle);

    if(parentNode){
      // label inside circle near the top — this is the back button
      const lbl = svgEl('text');
      lbl.setAttribute('x', enc.cx);
      lbl.setAttribute('y', ghostData ? ghostData.ghostY + LBLS : enc.cy - enc.r + 20);
      lbl.setAttribute('text-anchor', 'middle');
      lbl.setAttribute('dominant-baseline', ghostData ? 'auto' : 'hanging');
      lbl.setAttribute('font-family', '"JetBrains Mono", monospace');
      lbl.setAttribute('font-size', FS);
      lbl.setAttribute('fill', 'var(--accent)');
      lbl.setAttribute('cursor', 'pointer');
      lbl.textContent = parentNode.label;
      lbl.onclick = e => { e.stopPropagation(); navigateToIndex(graphStack.length - 2); };
      encG.appendChild(lbl);
    }

    svg.appendChild(encG);
  }

  // edges
  graph.edges.forEach(edge => {
    const fp = graph.nodes.find(n => n.ref === edge.from);
    const tp = graph.nodes.find(n => n.ref === edge.to);
    if(!fp || !tp || fp.x == null || tp.x == null) return;

    const dx = tp.x-fp.x, dy = tp.y-fp.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    if(len === 0) return;
    const ux = dx/len, uy = dy/len;

    const isAmbient = edge.type === 'ambient';
    const line = svgEl('line');
    line.setAttribute('x1', fp.x+R*ux); line.setAttribute('y1', fp.y+R*uy);
    line.setAttribute('x2', tp.x-R*ux); line.setAttribute('y2', tp.y-R*uy);
    line.setAttribute('stroke', isAmbient ? 'var(--muted)' : 'var(--ink)');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('marker-end', 'url(#arr)');
    if(isAmbient) line.setAttribute('stroke-dasharray', '5 4');
    svg.appendChild(line);
  });

  // nodes
  graph.nodes.forEach(p => {
    if(p.x == null) return;
    const node = getNode(p.ref);
    if(!node) return;

    const drillable = hasSubGraph(node.id);

    const g = svgEl('g');
    g.setAttribute('transform', `translate(${p.x},${p.y})`);
    if(drillable) g.style.cursor = 'pointer';

    const circle = svgEl('circle');
    circle.setAttribute('r', R);
    circle.setAttribute('cx', 0); circle.setAttribute('cy', 0);
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('fill', 'var(--paper)');

    if(node.type === 'ambient'){
      circle.setAttribute('stroke', 'var(--muted)');
      circle.setAttribute('stroke-dasharray', '4 3');
    } else if(node.type === 'output'){
      circle.setAttribute('stroke', 'var(--accent)');
    } else {
      circle.setAttribute('stroke', 'var(--ink)');
    }
    g.appendChild(circle);

    const text = svgEl('text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'auto');
    text.setAttribute('y', LBLS);
    text.setAttribute('font-family', '"JetBrains Mono", monospace');
    text.setAttribute('font-size', FS);
    text.setAttribute('fill',
      node.type === 'ambient' ? 'var(--muted)' :
      node.type === 'output'  ? 'var(--accent)' : 'var(--ink)');
    text.textContent = node.label;
    g.appendChild(text);

    if(drillable) g.onclick = () => navigateTo(node.id);
    svg.appendChild(g);
  });
}

// ── render: links ─────────────────────────────────────────────────────────────

function renderLinks(){
  const list = document.getElementById('link-list');
  list.innerHTML = '';
  DATA.links.forEach(lnk => {
    const li  = document.createElement('li');
    li.className = 'link-item';
    const a   = document.createElement('a');
    a.href = lnk.url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = lnk.title;
    const arr = document.createElement('span');
    arr.className = 'link-arr'; arr.textContent = '↗';
    li.appendChild(a); li.appendChild(arr);
    if(IS_LOCAL){
      const del = document.createElement('button');
      del.className = 'link-del'; del.textContent = '×';
      del.onclick = async () => {
        DATA.links = DATA.links.filter(l => l.id !== lnk.id);
        await saveData(); renderLinks();
      };
      li.appendChild(del);
    }
    list.appendChild(li);
  });
}

function setupAddLink(){
  if(!IS_LOCAL) return;
  document.getElementById('add-link-form').style.display = 'block';
  const titleIn = document.getElementById('add-link-title');
  const urlIn   = document.getElementById('add-link-url');
  urlIn.onkeydown = async e => {
    if(e.key !== 'Enter') return;
    const title = titleIn.value.trim();
    let url = urlIn.value.trim();
    if(!title || !url) return;
    if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
    DATA.links.push({id:'l-'+Date.now(), title, url});
    await saveData(); renderLinks(); titleIn.value = ''; urlIn.value = ''; titleIn.focus();
  };
}

// ── main ──────────────────────────────────────────────────────────────────────

function renderAll(){
  renderBreadcrumb();
  renderGraph();
}

async function init(){
  await loadData();
  if(DATA.lastUpdated)
    document.getElementById('last-updated').textContent = 'last updated: ' + DATA.lastUpdated;
  document.getElementById('h1-home').onclick = () => navigateToIndex(0);
  renderAll();
  renderLinks();
  setupAddLink();
}

init();
</script>
</body>
</html>
