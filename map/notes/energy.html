<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Energy — AI Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#e6e6e0; --ink:#191916; --muted:#6c6c63;
    --line:#c9c9c0; --accent:#2f7a3a;
  }
  @media(prefers-color-scheme:dark){
    :root{ --paper:#16161a; --ink:#e7e7e0; --muted:#9a9a90; --line:#33332f; --accent:#7fc98b; }
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--paper); color:var(--ink);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    line-height:1.6; -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .header{
    padding:24px 32px 20px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; gap:16px; justify-content:space-between;
  }
  .header h1{ font-size:15px; font-weight:700; letter-spacing:-0.01em; }
  .header a{ color:var(--muted); text-decoration:none; font-size:12px; flex-shrink:0; }
  .header a:hover{ color:var(--accent); }
  .content{
    max-width:680px; margin:0 auto; padding:48px 32px;
    font-size:13px; line-height:1.8;
  }
  .content h1, .content h2, .content h3{
    font-weight:700; letter-spacing:-0.01em; margin:1.6em 0 0.6em;
    scroll-margin-top:24px;
  }
  .content h1{ font-size:18px; }
  .content h2{ font-size:15px; }
  .content h3{ font-size:13px; color:var(--muted); }
  .content p{ margin:0 0 1.2em; }
  .content ul, .content ol{ margin:0 0 1.2em; padding-left:1.4em; }
  .content li{ margin:0.3em 0; }
  .content a{ color:var(--accent); }
  .content code{
    font-family:inherit; background:var(--line); padding:0.1em 0.3em; font-size:12px;
  }
  .content blockquote{
    border-left:2px solid var(--line); margin:0 0 1.2em; padding-left:1em; color:var(--muted);
  }
  .content img{ width:100%; height:auto; margin:0.5em 0; }
  .content hr{ border:none; border-top:1px solid var(--line); margin:2em 0; }
</style>

</head>
